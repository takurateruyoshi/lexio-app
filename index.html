<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>レキシオ — オンライン対戦</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- タイトル / セットアップ -->
  <section id="screen-title" class="panel">
    <h1>レキシオ <span class="sub">オンライン P2P 対戦</span></h1>
    <p class="lead">麻雀×ポーカー×大富豪。AIと遊ぶもよし、部屋を作って友達と対戦するもよし。
      空席にはベイズ推定AIが入ります。</p>
    <div class="setup-row">
      <label>プレイヤー名
        <input id="player-name" type="text" value="あなた" maxlength="20">
      </label>
      <label>人数（卓の大きさ）
        <select id="num-players">
          <option value="2">2人</option>
          <option value="3" selected>3人</option>
          <option value="4">4人</option>
          <option value="5">5人</option>
        </select>
      </label>
      <label>ラウンド数（1〜99）
        <input id="num-rounds" type="number" min="1" max="99" value="3">
      </label>
      <button id="rules-btn-title" class="ghost">ルールを見る</button>
    </div>
    <div class="setup-row">
      <button id="resume-btn" class="primary alt hidden">⏸ 続きから再開</button>
      <button id="solo-btn" class="primary">AIと対戦（ソロ）</button>
      <button id="create-room-btn" class="primary alt">部屋を作る</button>
      <span class="join-group">
        <input id="join-code" type="text" placeholder="部屋コード" maxlength="6">
        <button id="join-room-btn" class="ghost">参加する</button>
      </span>
    </div>
    <p class="hint" id="title-hint"></p>
    <p class="hint">※ オンライン対戦はP2P接続です。同じWi-Fi内なら確実につながります。
      リロードしても自動で復帰できます。</p>
  </section>

  <!-- ロビー -->
  <section id="screen-lobby" class="panel hidden">
    <h1>部屋コード <span id="room-code" class="room-code">-----</span>
      <button id="copy-code-btn" class="ghost small">コピー</button></h1>
    <p class="lead">このコードを友達に伝えてください。参加者はタイトル画面の「参加する」から入れます。</p>
    <div id="lobby-seats" class="lobby-seats"></div>
    <p class="hint" id="lobby-status"></p>
    <div class="setup-row">
      <button id="start-room-btn" class="primary">空席はAIで埋めて開始</button>
      <button id="lobby-leave-btn" class="ghost">退出</button>
    </div>
  </section>

  <!-- ゲーム（全画面ステージ） -->
  <section id="screen-game" class="hidden">
    <div id="game-stage">
      <div id="table3d" class="table3d"></div>
      <div id="center-info" class="center-info"></div>

      <div id="round-indicator" class="round-indicator"></div>
      <div class="top-menu">
        <label class="toggle"><input id="history-toggle" type="checkbox" checked>履歴</label>
        <button id="drawer-btn" class="ghost small">ログ</button>
        <button id="rules-btn-game" class="ghost small">ルール</button>
        <button id="end-btn" class="ghost small">終了提案</button>
        <button id="leave-btn" class="ghost small">タイトル</button>
      </div>

      <div id="net-banner" class="net-banner hidden"></div>
      <div id="turn-indicator" class="turn-indicator"></div>

      <div id="action-float" class="action-float">
        <span id="action-msg" class="action-msg"></span>
        <button id="pass-btn" class="ghost" disabled>パス</button>
        <button id="play-btn" class="primary" disabled>出す</button>
      </div>
      <div id="my-hand" class="my-hand"></div>

      <aside id="log-drawer" class="drawer hidden">
        <div class="drawer-head">プレイ履歴 / AIの読み
          <button id="drawer-close" class="ghost small">閉じる</button></div>
        <div id="log" class="log"></div>
      </aside>

      <aside id="result-panel" class="result-panel hidden">
        <h2 id="result-title">結果</h2>
        <p id="result-round" class="result-round"></p>
        <table id="result-table"></table>
        <div class="result-actions">
          <button id="result-again" class="primary">次のラウンドへ</button>
          <button id="result-hide" class="ghost">盤面を確認</button>
          <button id="result-title-btn" class="ghost">タイトルへ</button>
        </div>
      </aside>
      <button id="result-chip" class="result-chip hidden">結果を表示</button>

      <div id="orientation-hint" class="orientation-hint">
        <div class="oh-box">📱↻<br>横画面にしてください</div>
      </div>
    </div>
  </section>

  <!-- ルール -->
  <div id="rules-overlay" class="overlay hidden">
    <div class="result-card rules-card">
      <h2>レキシオのルール</h2>
      <div id="rules-body" class="rules-body"></div>
      <div class="setup-row center">
        <button id="rules-close" class="primary">閉じる</button>
      </div>
    </div>
  </div>

</div>
<script src="vendor/peerjs.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
