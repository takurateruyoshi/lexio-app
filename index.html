<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>レキシオ — オンライン対戦</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- タイトル: 続きから or 対戦 -->
  <section id="screen-title" class="panel title-panel">
    <h1>レキシオ <span class="sub">オンライン P2P 対戦</span></h1>
    <p class="lead">麻雀×ポーカー×大富豪。友達と、AIと、ブラウザだけで。</p>
    <div class="title-actions">
      <button id="resume-btn" class="primary big hidden">⏸ 続きから</button>
      <button id="battle-btn" class="primary big">▶ 対戦する</button>
    </div>
    <div class="setup-row">
      <span class="join-group">
        <input id="join-code" type="text" placeholder="部屋コード" maxlength="6">
        <button id="join-room-btn" class="ghost">コードで参加</button>
      </span>
      <button id="tutorial-btn" class="ghost">📖 チュートリアル</button>
    </div>
    <div class="title-footer">
      <button id="rules-btn-title" class="ghost small">ルール</button>
      <button id="export-btn" class="ghost small">牌譜をエクスポート</button>
      <label class="toggle"><input id="collect-toggle" type="checkbox" checked>
        対局データを研究用に送信</label>
    </div>
    <p class="hint" id="model-info"></p>
    <p class="hint" id="title-hint"></p>
  </section>

  <!-- 対戦設定 -->
  <section id="screen-setup" class="panel hidden">
    <h1>対戦設定</h1>
    <div class="setup-block">
      <div class="setup-label">卓の人数</div>
      <div id="size-buttons" class="choice-row">
        <button data-size="2" class="choice">2人</button>
        <button data-size="3" class="choice active">3人</button>
        <button data-size="4" class="choice">4人</button>
        <button data-size="5" class="choice">5人</button>
      </div>
    </div>
    <div class="setup-block">
      <div class="setup-label">AIの席数（残りは人間の席。全席AIにするとAI同士の対局を観戦できます）</div>
      <div id="ai-buttons" class="choice-row"></div>
      <p id="seat-preview" class="seat-preview"></p>
    </div>
    <div class="setup-block">
      <div class="setup-label">ラウンド数（1〜99）</div>
      <input id="num-rounds" type="number" min="1" max="99" value="3">
    </div>
    <div id="spectate-opts" class="setup-block hidden">
      <div class="setup-label">観戦オプション</div>
      <div class="setup-row">
        <label>連続対局数
          <input id="num-games" type="number" min="1" max="100" value="3">
        </label>
        <label class="toggle"><input id="precise-toggle" type="checkbox">
          精密思考（1手1秒・研究用）</label>
      </div>
    </div>
    <div class="setup-row">
      <button id="setup-go-btn" class="primary big">部屋を作る</button>
      <button id="setup-back-btn" class="ghost">戻る</button>
    </div>
    <p class="hint" id="setup-hint"></p>
  </section>

  <!-- ロビー -->
  <section id="screen-lobby" class="panel hidden">
    <h1>部屋コード <span id="room-code" class="room-code">-----</span></h1>
    <div class="setup-row">
      <label>あなたの名前
        <input id="player-name" type="text" value="あなた" maxlength="20">
      </label>
    </div>
    <div class="invite-box">
      <div class="setup-label">友達を招待（リンクを開くだけで参加できます）</div>
      <div class="invite-row">
        <input id="invite-link" type="text" readonly>
        <button id="copy-link-btn" class="ghost small">リンクをコピー</button>
        <button id="share-link-btn" class="ghost small hidden">共有</button>
        <button id="copy-code-btn" class="ghost small">コードをコピー</button>
      </div>
    </div>
    <div id="lobby-seats" class="lobby-seats"></div>
    <p class="hint" id="lobby-status"></p>
    <div class="setup-row">
      <button id="start-room-btn" class="primary">開始する（空席はAIが埋めます）</button>
      <button id="lobby-leave-btn" class="ghost">退出</button>
    </div>
  </section>

  <!-- ゲーム（全画面ステージ） -->
  <section id="screen-game" class="hidden">
    <div id="game-stage">
      <div id="table3d" class="table3d"></div>
      <div id="center-info" class="center-info"></div>

      <div id="round-indicator" class="round-indicator"></div>
      <div class="top-menu">
        <label class="toggle spectate-only hidden"><input id="reveal-toggle" type="checkbox" checked>手札公開</label>
        <select id="speed-select" class="spectate-only hidden">
          <option value="0">即時</option>
          <option value="200" selected>高速</option>
          <option value="650">通常</option>
        </select>
        <label class="toggle"><input id="history-toggle" type="checkbox" checked>履歴</label>
        <button id="drawer-btn" class="ghost small">ログ</button>
        <button id="rules-btn-game" class="ghost small">ルール</button>
        <button id="end-btn" class="ghost small">終了提案</button>
        <button id="leave-btn" class="ghost small">タイトル</button>
      </div>

      <div id="net-banner" class="net-banner hidden"></div>
      <div id="turn-indicator" class="turn-indicator"></div>

      <div id="action-float" class="action-float">
        <span id="action-msg" class="action-msg"></span>
        <button id="pass-btn" class="ghost" disabled>パス</button>
        <button id="play-btn" class="primary" disabled>出す</button>
      </div>
      <div id="my-hand" class="my-hand"></div>

      <aside id="log-drawer" class="drawer hidden">
        <div class="drawer-head">プレイ履歴 / AIの読み
          <button id="drawer-close" class="ghost small">閉じる</button></div>
        <div id="log" class="log"></div>
      </aside>

      <aside id="result-panel" class="result-panel hidden">
        <h2 id="result-title">結果</h2>
        <p id="result-round" class="result-round"></p>
        <table id="result-table"></table>
        <div class="result-actions">
          <button id="result-again" class="primary">次のラウンドへ</button>
          <button id="result-hide" class="ghost">盤面を確認</button>
          <button id="result-title-btn" class="ghost">タイトルへ</button>
        </div>
      </aside>
      <button id="result-chip" class="result-chip hidden">結果を表示</button>

      <div id="orientation-hint" class="orientation-hint">
        <div class="oh-box">📱↻<br>横画面にしてください</div>
      </div>
    </div>
  </section>

  <!-- リンク/コード参加（名前入力） -->
  <div id="join-overlay" class="overlay hidden">
    <div class="result-card join-card">
      <h2>対局に参加</h2>
      <p class="lead">部屋 <b id="join-code-label" class="room-code small-code">-----</b> に参加します。</p>
      <div class="setup-row center">
        <label>あなたの名前
          <input id="join-name" type="text" value="あなた" maxlength="20">
        </label>
      </div>
      <div class="setup-row center">
        <button id="join-go-btn" class="primary">参加する</button>
        <button id="join-cancel-btn" class="ghost">やめる</button>
      </div>
      <p class="hint" id="join-hint"></p>
    </div>
  </div>

  <!-- チュートリアル -->
  <div id="tutorial-overlay" class="overlay hidden">
    <div class="result-card rules-card tutorial-card">
      <h2 id="tutorial-title">チュートリアル</h2>
      <div id="tutorial-body" class="rules-body"></div>
      <div class="setup-row center">
        <button id="tutorial-prev" class="ghost">← 前へ</button>
        <span id="tutorial-step" class="hint"></span>
        <button id="tutorial-next" class="primary">次へ →</button>
      </div>
    </div>
  </div>

  <!-- ルール -->
  <div id="rules-overlay" class="overlay hidden">
    <div class="result-card rules-card">
      <h2>レキシオのルール</h2>
      <div id="rules-body" class="rules-body"></div>
      <div class="setup-row center">
        <button id="rules-close" class="primary">閉じる</button>
      </div>
    </div>
  </div>

</div>
<script src="vendor/peerjs.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
