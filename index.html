<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lexio">
<meta name="theme-color" content="#0c0d10">
<title>レキシオ — オンライン対戦</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- タイトル: 続きから or 対戦 -->
  <section id="screen-title" class="title-screen">
    <h1 class="logo"><span class="lx">Lex</span><span class="lx-i">i</span><span class="lx">o</span>
      <span class="neo">Neo</span></h1>
    <div class="title-actions">
      <button id="battle-btn" class="primary big">▶ 対戦する</button>
      <button id="resume-btn" class="primary alt big hidden">⏸ 続きから</button>
    </div>
    <div class="title-sub">
      <button id="tutorial-btn" class="ghost">📖 チュートリアル</button>
      <span class="join-group">
        <input id="join-code" type="text" placeholder="部屋コード" maxlength="6">
        <button id="join-room-btn" class="ghost">参加</button>
      </span>
    </div>
    <p class="hint" id="title-hint"></p>
    <details class="title-more">
      <summary>その他（ルール・診断・研究）</summary>
      <div class="title-footer">
        <button id="rules-btn-title" class="ghost small">ルール</button>
        <button id="diag-btn" class="ghost small">接続診断</button>
        <button id="export-btn" class="ghost small">牌譜をエクスポート</button>
        <label class="toggle"><input id="collect-toggle" type="checkbox" checked>
          対局データを研究用に送信</label>
      </div>
      <p class="hint" id="model-info"></p>
    </details>
  </section>

  <!-- 対戦設定 -->
  <section id="screen-setup" class="hidden">
    <div id="setup-stage">
      <h1 class="stage-title">対戦設定</h1>
      <div class="stepper-list">
        <div class="stepper-row">
          <span class="stepper-label">卓の人数</span>
          <button class="step-btn" data-k="size" data-d="-1">◀</button>
          <span class="step-value" id="val-size">3人</span>
          <button class="step-btn" data-k="size" data-d="1">▶</button>
        </div>
        <div class="stepper-row">
          <span class="stepper-label">AIの席数</span>
          <button class="step-btn" data-k="ai" data-d="-1">◀</button>
          <span class="step-value" id="val-ai">0人</span>
          <button class="step-btn" data-k="ai" data-d="1">▶</button>
        </div>
        <div class="stepper-row" id="row-rule">
          <span class="stepper-label">ルール</span>
          <button class="step-btn" data-k="rule" data-d="-1">◀</button>
          <span class="step-value" id="val-rule">クラシック</span>
          <button class="step-btn" data-k="rule" data-d="1">▶</button>
        </div>
        <div class="stepper-row">
          <span class="stepper-label">ラウンド数</span>
          <button class="step-btn" data-k="rounds" data-d="-1">◀</button>
          <span class="step-value" id="val-rounds">3回</span>
          <button class="step-btn" data-k="rounds" data-d="1">▶</button>
        </div>
        <div class="stepper-row" id="row-limit">
          <span class="stepper-label">思考時間</span>
          <button class="step-btn" data-k="limit" data-d="-1">◀</button>
          <span class="step-value" id="val-limit">なし</span>
          <button class="step-btn" data-k="limit" data-d="1">▶</button>
        </div>
        <div class="stepper-row hidden" id="row-games">
          <span class="stepper-label">連続対局数</span>
          <button class="step-btn" data-k="games" data-d="-1">◀</button>
          <span class="step-value" id="val-games">3局</span>
          <button class="step-btn" data-k="games" data-d="1">▶</button>
        </div>
      </div>
      <p id="seat-preview" class="seat-preview"></p>
      <p id="rule-note" class="hint"></p>
      <label id="precise-row" class="toggle hidden"><input id="precise-toggle" type="checkbox">
        精密思考（1手1秒・研究用）</label>
      <p class="hint" id="setup-hint"></p>
      <button id="setup-back-btn" class="stage-back">◀ BACK</button>
      <button id="setup-go-btn" class="stage-ok">OK ▶</button>
    </div>
  </section>

  <!-- ロビー -->
  <section id="screen-lobby" class="hidden">
    <div id="lobby-stage">
      <h1 class="stage-title">対戦ロビー</h1>
      <div id="lobby-seats" class="table3d"></div>
      <div class="lobby-center">
        <div class="lobby-code-badge">部屋コード <b id="room-code">-----</b>
          <button id="copy-code-btn" class="ghost small">コピー</button></div>
        <div class="lobby-invite">
          <input id="invite-link" type="text" readonly>
          <button id="copy-link-btn" class="ghost small">リンクをコピー</button>
          <button id="share-link-btn" class="ghost small hidden">共有</button>
        </div>
        <p class="hint" id="lobby-status"></p>
      </div>
      <div class="lobby-bottom">
        <label class="lobby-name">名前
          <input id="player-name" type="text" value="あなた" maxlength="20">
        </label>
      </div>
      <button id="lobby-leave-btn" class="stage-back">◀ 退出</button>
      <button id="start-room-btn" class="stage-ok">開始する ▶</button>
    </div>
  </section>

  <!-- ゲーム（全画面ステージ） -->
  <section id="screen-game" class="hidden">
    <div id="game-stage">
      <div id="table3d" class="table3d"></div>
      <div id="center-info" class="center-info"></div>

      <div id="round-indicator" class="round-indicator"></div>
      <div id="tut-hint" class="tut-hint hidden"></div>
      <div class="top-menu">
        <button id="menu-btn" class="ghost small">☰</button>
        <div id="menu-panel" class="menu-panel hidden">
          <label class="toggle spectate-only hidden"><input id="reveal-toggle" type="checkbox" checked>手札公開</label>
          <select id="speed-select" class="spectate-only hidden">
            <option value="0">即時</option>
            <option value="200" selected>高速</option>
            <option value="650">通常</option>
          </select>
          <label class="toggle"><input id="history-toggle" type="checkbox" checked>履歴</label>
          <button id="fullscreen-btn" class="ghost small">⛶ 全画面</button>
          <button id="rules-btn-game" class="ghost small">ルール</button>
          <button id="prev-btn" class="ghost small">前局の結果</button>
          <button id="leave-btn" class="ghost small">タイトルへ</button>
        </div>
      </div>

      <div id="net-banner" class="net-banner hidden"></div>

      <button id="pass-btn" class="ghost side-btn side-left hidden" disabled>パス</button>
      <div id="play-wrap" class="side-btn side-right hidden">
        <span id="turn-timer" class="turn-timer hidden"></span>
        <button id="play-btn" class="primary" disabled>出す</button>
      </div>
      <span id="action-msg" class="action-msg"></span>
      <div id="my-cards" class="my-cards"></div>
      <div id="card-ctx" class="card-ctx hidden"></div>
      <div id="my-info" class="my-info"></div>
      <div id="my-hand" class="my-hand"></div>

      <aside id="result-panel" class="result-panel hidden">
        <h2 id="result-title">結果</h2>
        <p id="result-round" class="result-round"></p>
        <table id="result-table"></table>
        <div class="result-actions">
          <button id="result-again" class="primary">次のラウンドへ</button>
          <button id="result-hide" class="ghost">盤面を確認</button>
          <button id="result-title-btn" class="ghost">タイトルへ</button>
        </div>
      </aside>
      <button id="result-chip" class="result-chip hidden">結果を表示</button>
    </div>
  </section>

  <!-- リンク/コード参加（名前入力） -->
  <div id="join-overlay" class="overlay hidden">
    <div class="result-card join-card">
      <button id="join-cancel-btn" class="modal-x">✕</button>
      <h2>対局に参加</h2>
      <p class="lead">部屋 <b id="join-code-label" class="room-code small-code">-----</b> に参加します。</p>
      <div class="setup-row center">
        <label>あなたの名前
          <input id="join-name" type="text" value="あなた" maxlength="20">
        </label>
      </div>
      <div class="setup-row center">
        <button id="join-go-btn" class="primary">参加する</button>
      </div>
      <p class="hint" id="join-stage"></p>
      <p class="hint" id="join-hint"></p>
    </div>
  </div>

  <!-- 接続診断 -->
  <div id="diag-overlay" class="overlay hidden">
    <div class="result-card join-card">
      <button id="diag-close" class="modal-x">✕</button>
      <h2>接続診断</h2>
      <p class="lead">オンライン対戦に必要な3つの経路を確認します。</p>
      <div id="diag-body" class="diag-body">
        <div class="diag-row"><span id="diag-sig">…</span> 仲介サーバー（部屋の作成・発見）</div>
        <div class="diag-row"><span id="diag-stun">…</span> STUN（直接接続のためのアドレス取得）</div>
        <div class="diag-row"><span id="diag-turn">…</span> TURN（NAT越え失敗時の中継）</div>
      </div>
      <p class="hint" id="diag-advice"></p>
      <div class="setup-row center">
        <button id="diag-run" class="primary">再テスト</button>
      </div>
    </div>
  </div>

  <!-- ルール -->
  <div id="rules-overlay" class="overlay hidden">
    <div class="result-card rules-card">
      <button id="rules-close" class="modal-x">✕</button>
      <h2>レキシオのルール</h2>
      <div id="rules-body" class="rules-body"></div>
    </div>
  </div>

</div>
<script src="vendor/peerjs.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
